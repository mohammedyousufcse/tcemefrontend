<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>TCEME - Student Portal</title>
    <link rel="shortcut icon" href="images/tce_logo_11zon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-left">
        <img src="images/tce_logo_11zon.png" alt="TCE" id="logo">
        <div class="header-text">
            <h2>Thiagarajar College Of Engineering</h2><hr>
            <h3>Department Of Mechanical Engineering</h3>
        </div>
    </div>
    <button class="lock-btn" id="lockBtn" onclick="logout()">🔒<br> Lock</button>
</header>

<!-- PIN PAGE -->
<div id="pin-page">
    <div class="pin-card">
        <div class="pin-logo">
            <img src="images/students.png" alt="students">
        </div>
        <div class="pin-title">Student Portal</div>
        <div class="pin-sub">Enter 4-digit PIN to continue</div>
        <div class="pin-dots">
            <div class="pin-dot" id="d1"></div>
            <div class="pin-dot" id="d2"></div>
            <div class="pin-dot" id="d3"></div>
            <div class="pin-dot" id="d4"></div>
        </div>
        <div class="pin-error" id="pinError"></div>
        <div class="pin-keypad">
            <button class="pin-btn" onclick="pinPress('1')">1</button>
            <button class="pin-btn" onclick="pinPress('2')">2</button>
            <button class="pin-btn" onclick="pinPress('3')">3</button>
            <button class="pin-btn" onclick="pinPress('4')">4</button>
            <button class="pin-btn" onclick="pinPress('5')">5</button>
            <button class="pin-btn" onclick="pinPress('6')">6</button>
            <button class="pin-btn" onclick="pinPress('7')">7</button>
            <button class="pin-btn" onclick="pinPress('8')">8</button>
            <button class="pin-btn" onclick="pinPress('9')">9</button>
            <button class="pin-btn zero" onclick="pinPress('0')">0</button>
            <button class="pin-btn del" onclick="pinDelete()">⌫</button>
        </div>
    </div>
</div>

<!-- APP PAGE -->
<div id="app-page">
    <div class="search-bar-wrap" style="position:relative;">
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search name or reg. no..." autocomplete="off">
            <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
        </div>
        <div id="suggestions" class="suggestions-wrap" style="display:none;"></div>
    </div>

    <div class="batch-filter">
        <button class="batch-btn active" onclick="setBatch('all',this)">All Batches</button>
        <button class="batch-btn" onclick="setBatch('2021 - 2025',this)">2021-2025</button>
        <button class="batch-btn" onclick="setBatch('2022 - 2026',this)">2022-2026</button>
        <button class="batch-btn" onclick="setBatch('2023 - 2027',this)">2023-2027</button>
        <button class="batch-btn" onclick="setBatch('2024 - 2028',this)">2024-2028</button>
    </div>

    <div class="students-list">
        <div class="list-header" id="listHeader">Loading students...</div>
        <div id="studentList"></div>
    </div>
</div>

<!-- MODAL -->
<div id="detailModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box">
        <div class="modal-top">
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<script src="javascript.js"></script>


</body>
</html>
